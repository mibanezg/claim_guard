; ── Pool de PHP-FPM para producción ──────────────────────────────────────────
[www]
user  = www-data
group = www-data

listen = 127.0.0.1:9000

; Modo dinámico: escala entre min y max según carga
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests      = 500

; Log de requests lentos (> 5 s) para detectar N+1 y consultas pesadas
slowlog            = /dev/stderr
request_slowlog_timeout = 5s

; Tiempo máximo por request (debe coincidir con nginx fastcgi_read_timeout)
request_terminate_timeout = 300
